name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          envs: OPENAI_API_KEY,NEWS_API_KEY,FRED_API_KEY,FINNHUB_API_KEY,ALPHA_VANTAGE_API_KEY
          script: |
            set -e
            cd ~/financial-ai

            # 최신 코드 pull (로컬 변경사항 무시)
            git reset --hard HEAD
            git pull origin master

            # .env 파일 생성 (각 Secret을 개별 변수로 주입)
            cat > .env <<EOF
            OPENAI_API_KEY=${OPENAI_API_KEY}
            NEWS_API_KEY=${NEWS_API_KEY}
            FRED_API_KEY=${FRED_API_KEY}
            FINNHUB_API_KEY=${FINNHUB_API_KEY}
            ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
            EOF

            # 가상환경 활성화 및 패키지 업데이트
            source .venv/bin/activate
            pip install -r requirements.txt --quiet

            # systemd 서비스 등록 (최초 1회)
            sudo tee /etc/systemd/system/financial-ai.service > /dev/null <<EOF
            [Unit]
            Description=Financial AI Streamlit
            After=network.target

            [Service]
            User=ec2-user
            WorkingDirectory=/home/ec2-user/financial-ai
            EnvironmentFile=/home/ec2-user/financial-ai/.env
            ExecStart=/home/ec2-user/financial-ai/.venv/bin/streamlit run app.py \
              --server.port 8501 \
              --server.address 0.0.0.0
            Restart=always
            RestartSec=5
            StandardOutput=append:/home/ec2-user/streamlit.log
            StandardError=append:/home/ec2-user/streamlit.log

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable financial-ai
            sudo systemctl restart financial-ai

            echo "배포 완료"
